<!doctype html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8" />
        <title>Cadastro</title>
        <link rel="stylesheet" href="./style.css"
    </head>
    <body>
        <div class="conteiner">
            <form action="@">
                <div class="titulo">
                    <h1>Faça seu cadastro!</h1>
                </div>
                <br>
                <label for="email">Digite seu email:</label>
                <br>
                <input
                    id="email"
                    type="text"
                    name="email"
                    placeholder="email:"
                    required
                />
                <br>
                <label for="senha">Digite sua senha:</label>
                <br>
                <input
                    id="senha"
                    type="password"
                    name="senha"
                    placeholder="senha:"
                    required
                />
                <br>
                <label for="cpf">Seu cpf:</label>
                <br>
                <input
                    id="cpf"
                    type="text"
                    name="cpf"
                    placeholder="cpf:"
                    required
                />
                <br>
                <label for="nome">Seu nome de usuário:</label>
                <br>
                <input
                    id="nome"
                    type="text"
                    name="nome"
                    placeholder="nome:"
                    required
                />
                <br>
                <input class="botao" type="submit" value="enviar" />
            </form>
        </div>
    </body>
</html>
